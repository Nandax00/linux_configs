scrolling:
  history: 100000

# Font configuration
font:
  # Normal (roman) font face
  normal:
    family: mononoki
    style: Regular

  # Bold font face
  bold:
    family: mononoki
    style: Bold

  # Italic font face
  italic:
    family: mononoki
    style: Italic

  # Bold italic font face
  bold_italic:
    family: mononoki
    style: Bold Italic

  # Point size
  size: 12.0

draw_bold_text_with_bright_colors: true

selection:
  save_to_clipboard: true
