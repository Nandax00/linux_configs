[colors]
draw_bold_text_with_bright_colors = true

[colors.footer_bar]
background = "#45403d"
foreground = "#fabd2f"

[colors.line_indicator]
background = "#45403d"
foreground = "#fabd2f"

[colors.primary]
background = "#282828"
foreground = "#ebdbb2"

[colors.search.focused_match]
background = "#b8bb26"
foreground = "#282828"

[colors.search.matches]
background = "#45403d"
foreground = "#b8bb26"

[font]
size = 10.0

[font.bold]
family = "Fira Mono"
style = "Bold"

[font.bold_italic]
family = "Fira Mono"
style = "Bold Italic"

[font.italic]
family = "Fira Mono"
style = "Italic"

[font.normal]
family = "Fira Mono"
style = "Regular"

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key = "U"
mods = "Alt"

[hints.enabled.mouse]
enabled = true
mods = "None"

[keyboard]
bindings = [
{ key = "J", mods = "Control", action = "ToggleViMode"},
]

[scrolling]
history = 100000
multiplier = 3

[selection]
save_to_clipboard = true
