[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
foreground = "#ECE1D7"
background = "#292522"

[colors.normal]
black = "#34302C"
red = "#BD8183"
green = "#78997A"
yellow = "#E49B5D"
blue = "#7F91B2"
magenta = "#B380B0"
cyan = "#7B9695"
white = "#C1A78E"

[colors.bright]
black = "#867462"
red = "#D47766"
green = "#85B695"
yellow = "#EBC06D"
blue = "#A3A9CE"
magenta = "#CF9BC2"
cyan = "#89B3B6"
white = "#ECE1D7"

[colors.footer_bar]
foreground = "#ECE1D7"
background = "#292522"

[colors.line_indicator]
foreground = "#ECE1D7"
background = "#292522"

[colors.search.focused_match]
foreground = "#ECE1D7"
background = "#292522"

[colors.search.matches]
foreground = "#ECE1D7"
background = "#292522"

[font]
size = 10.0

[font.normal]
family = "JetBrainsMono NF"
style = "Regular"

[font.bold]
family = "JetBrainsMono NF"
style = "Bold"

[font.italic]
family = "JetBrainsMono NF"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono NF"
style = "Bold Italic"


[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key = "U"
mods = "Alt"

[hints.enabled.mouse]
enabled = true
mods = "None"

[keyboard]
bindings = [
{ key = "J", mods = "Control", action = "ToggleViMode"},
]

[scrolling]
history = 100000
multiplier = 3

[selection]
save_to_clipboard = true
